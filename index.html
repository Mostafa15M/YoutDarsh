<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Darsh Egypt - Downloader</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --primary-gradient: linear-gradient(90deg, #00e5ff, #b465ff);
            --bg-dark: #020617;
            --card-bg: rgba(15, 23, 42, 0.7);
            --border-color: rgba(0, 229, 255, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px),
                radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 40px);
            background-size: 550px 550px, 350px 350px, 250px 250px;
            background-position: 0 0, 40px 60px, 130px 270px;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        /* اللوجو */
        .logo {
            font-size: 42px;
            font-weight: 900;
            background: linear-gradient(to bottom, #7dd3fc, #d8b4fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(125, 211, 252, 0.5));
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 35px;
            font-weight: 500;
        }

        /* الأيقونات - تكبير حسب الطلب */
        .platforms {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 40px;
        }

        .platform-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 15px;
            padding: 15px 5px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
            cursor: pointer;
        }

        .platform-card:hover {
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.4);
            transform: translateY(-3px);
        }

        .platform-card i {
            font-size: 28px; /* حجم الأيقونة */
        }

        .platform-card span {
            font-size: 11px;
            color: #cbd5e1;
        }

        /* بوكس الإدخال */
        .input-wrapper {
            background: rgba(15, 23, 42, 0.6);
            padding: 30px 20px;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
        }

        input#url {
            width: 100%;
            padding: 16px;
            background: #10172a;
            border: 1px solid #1e293b;
            border-radius: 12px;
            color: white;
            text-align: center;
            margin-bottom: 15px;
            font-size: 14px;
            outline: none;
        }

        input#url:focus {
            border-color: #38bdf8;
        }

        /* زر التحميل */
        .main-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            background: var(--primary-gradient);
            color: white;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(180, 101, 255, 0.3);
        }

        .main-btn:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }

        /* --- صفحة الجودات (النتيجة) --- */
        .quality-container {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(0, 229, 255, 0.4);
            border-radius: 20px;
            padding: 2px;
            overflow: hidden;
            display: none;
        }

        .quality-header {
            background: var(--primary-gradient);
            padding: 15px;
            font-weight: 900;
            font-size: 20px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .tabs {
            display: flex;
            padding: 15px;
            gap: 15px;
        }

        .tab-btn {
            flex: 1;
            padding: 30px 10px;
            background: transparent;
            border: 1px solid rgba(0, 229, 255, 0.3);
            border-radius: 15px;
            color: white;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            position: relative;
        }

        .tab-btn.active {
            border-color: #00e5ff;
        }

        .tab-btn.active::after {
            content: '✔';
            position: absolute;
            top: 10px;
            right: 10px;
            color: #00e5ff;
            font-size: 12px;
        }

        .tab-btn i { font-size: 24px; }

        .quality-list {
            padding: 0 15px 20px;
        }

        .quality-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.03);
            margin-bottom: 8px;
            padding: 15px;
            border-radius: 10px;
        }

        .quality-info {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
        }

        .badge-uhd {
            background: #1e293b;
            color: white;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            border: 1px solid #444;
        }

        footer {
            margin-top: 30px;
            font-size: 12px;
            color: #475569;
        }

        /* أنيميشن */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in { animation: fadeIn 0.5s ease forwards; }

    </style>
</head>
<body>

    <div class="container fade-in" id="input-page">
        <h1 class="logo">Darsh Egypt</h1>
        <p class="subtitle">تنزيل من يوتيوب - تيك توك - فيسبوك - إنستا</p>

        <div class="platforms">
            <div class="platform-card">
                <i class="fab fa-instagram" style="color: #e1306c;"></i>
                <span>إنستا</span>
            </div>
            <div class="platform-card">
                <i class="fab fa-facebook" style="color: #1877f2;"></i>
                <span>فيسبوك</span>
            </div>
            <div class="platform-card">
                <i class="fab fa-tiktok" style="color: #ffffff;"></i>
                <span>تيك توك</span>
            </div>
            <div class="platform-card">
                <i class="fab fa-youtube" style="color: #ff0000;"></i>
                <span>يوتيوب</span>
            </div>
        </div>

        <div class="input-wrapper">
            <input type="text" id="url" placeholder="أدخل رابط الفيديو هنا...">
            <button class="main-btn" onclick="startDownload()">
                <i class="fas fa-download"></i> ابدأ التحميل الآن!
            </button>
        </div>
    </div>

    <div class="container fade-in" id="result-page" style="display: none;">
        <div class="quality-container">
            <div class="quality-header">
                <i class="fas fa-download"></i> Quality
            </div>
            
            <div class="tabs">
                <div class="tab-btn active" onclick="switchTab('video')">
                    <i class="fas fa-play"></i>
                    <span>الفيديوهات</span>
                    <p style="font-size: 12px; margin-top: 5px; color: #94a3b8;">Video</p>
                </div>
                <div class="tab-btn" onclick="switchTab('audio')">
                    <i class="fas fa-music"></i>
                    <span>الصوت</span>
                    <p style="font-size: 12px; margin-top: 5px; color: #94a3b8;">Audio</p>
                </div>
            </div>

            <div class="quality-list" id="links-container">
                <div class="quality-item">
                    <div class="quality-info">4K (2160p) <span class="badge-uhd">UHD</span></div>
                    <i class="fas fa-arrow-down"></i>
                </div>
                <div class="quality-item">
                    <div class="quality-info">1080p Full HD</div>
                    <i class="fas fa-arrow-down"></i>
                </div>
                <div class="quality-item">
                    <div class="quality-info">720p HD</div>
                    <i class="fas fa-arrow-down"></i>
                </div>
                <div class="quality-item">
                    <div class="quality-info">480p SD</div>
                    <i class="fas fa-arrow-down"></i>
                </div>
                <div class="quality-item">
                    <div class="quality-info">360p</div>
                    <i class="fas fa-arrow-down"></i>
                </div>
            </div>
        </div>
        
        <button class="main-btn" style="margin-top: 20px; background: #1e293b;" onclick="location.reload()">
            تحميل فيديو آخر
        </button>
    </div>

    <footer>© Darsh Egypt</footer>

    <script>
        function startDownload() {
            const url = document.getElementById('url').value;
            if(!url) {
                alert("برجاء وضع الرابط أولاً");
                return;
            }
            
            // إخفاء الصفحة الأولى وإظهار الثانية مع انيميشن
            document.getElementById('input-page').style.display = 'none';
            const resultPage = document.getElementById('result-page');
            resultPage.style.display = 'block';
        }

        function switchTab(type) {
            const buttons = document.querySelectorAll('.tab-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            event.currentTarget.classList.add('active');
            
            // هنا يمكنك إضافة منطق تبديل الجودات بين الصوت والفيديو
        }
    </script>
</body>
</html>
