<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>YoutDarsh - تحميل يوتيوب وتيك توك وإنستا</title>
  <meta name="description" content="YoutDarsh - أفضل موقع تحميل فيديوهات بدون علامة مائية بواسطة Bob"/>

  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #000814;
      --neon: #00f0ff;
      --neon-pink: #ff00aa;
      --card: rgba(10, 10, 30, 0.75);
      --text: #e0f7ff;
      --gray: #a0d0ff;
      --border: rgba(0, 240, 255, 0.3);
      --glow: 0 0 20px rgba(0, 240, 255, 0.6);
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Tajawal', sans-serif;
      min-height: 100vh;
      background: var(--bg) url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><circle cx="10" cy="10" r="1" fill="%23ffffff22"/><circle cx="30" cy="70" r="1.5" fill="%23ffffff22"/><circle cx="80" cy="20" r="0.8" fill="%23ffffff22"/><circle cx="60" cy="90" r="1.2" fill="%23ffffff22"/></svg>') repeat;
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px 15px;
    }

    .container {
      width: 100%;
      max-width: 680px;
      background: var(--card);
      backdrop-filter: blur(12px);
      border-radius: 24px;
      padding: 40px 30px;
      border: 1px solid var(--border);
      box-shadow: var(--glow), inset 0 0 30px rgba(0,240,255,0.08);
      margin: 20px auto;
    }

    .logo {
      font-size: 3.6rem;
      font-weight: 900;
      text-align: center;
      margin-bottom: 12px;
      background: linear-gradient(90deg, var(--neon), var(--neon-pink), #00ff88);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 20px rgba(0,240,255,0.7);
    }

    .subtitle {
      text-align: center;
      color: var(--gray);
      font-size: 1.25rem;
      margin-bottom: 40px;
    }

    .input-box {
      position: relative;
      margin-bottom: 35px;
    }

    #url {
      width: 100%;
      padding: 18px 20px 18px 60px;
      font-size: 1.15rem;
      background: rgba(5, 15, 40, 0.7);
      border: 2px solid var(--border);
      border-radius: 16px;
      color: white;
      outline: none;
      transition: all 0.35s;
    }

    #url:focus {
      border-color: var(--neon);
      box-shadow: 0 0 0 5px rgba(0,240,255,0.25);
    }

    .icon {
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.8rem;
      color: var(--gray);
    }

    .btn-group {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      justify-content: center;
      margin-bottom: 40px;
    }

    .platform-btn {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      border: none;
      font-size: 2.2rem;
      cursor: pointer;
      transition: all 0.3s;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(6px);
      box-shadow: inset 0 0 10px rgba(255,255,255,0.08);
    }

    .platform-btn:hover {
      transform: scale(1.12) rotate(5deg);
      box-shadow: 0 0 25px rgba(0,240,255,0.5);
    }

    .main-btn {
      padding: 16px 40px;
      font-size: 1.2rem;
      font-weight: 700;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      background: linear-gradient(135deg, var(--neon), var(--neon-pink));
      color: black;
      transition: all 0.4s;
      box-shadow: 0 0 20px rgba(0,240,255,0.5);
    }

    .main-btn:hover {
      transform: translateY(-4px) scale(1.04);
      box-shadow: 0 0 35px rgba(0,240,255,0.8);
    }

    #status {
      text-align: center;
      font-size: 1.3rem;
      margin: 25px 0;
      min-height: 2em;
    }

    #qualities-page {
      display: none;
      margin-top: 40px;
    }

    .tab-group {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 30px;
    }

    .tab {
      padding: 12px 32px;
      font-size: 1.15rem;
      font-weight: 600;
      border-radius: 12px;
      cursor: pointer;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      transition: all 0.3s;
    }

    .tab.active {
      background: linear-gradient(135deg, var(--neon), var(--neon-pink));
      color: black;
      border: none;
      box-shadow: 0 0 20px rgba(0,240,255,0.6);
    }

    .quality-list {
      display: grid;
      gap: 16px;
    }

    .quality-card {
      background: rgba(15, 15, 40, 0.6);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
      transition: all 0.3s;
    }

    .quality-card:hover {
      border-color: var(--neon);
      box-shadow: 0 0 25px rgba(0,240,255,0.3);
      transform: translateY(-3px);
    }

    .quality-info {
      flex: 1;
    }

    .quality-title {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .quality-desc {
      color: var(--gray);
      font-size: 0.95rem;
    }

    .thumb {
      width: 120px;
      height: 68px;
      object-fit: cover;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0,0,0,0.6);
    }

    .dl-btn {
      background: var(--neon);
      color: black;
      padding: 12px 24px;
      border-radius: 12px;
      border: none;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
    }

    .dl-btn:hover {
      background: var(--neon-pink);
      transform: scale(1.08);
    }

    footer {
      margin-top: auto;
      padding: 60px 0 40px;
      color: #555577;
      font-size: 1rem;
      text-align: center;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="logo">YoutDarsh</div>
  <div class="subtitle">تحميل فيديوهات وصوت من يوتيوب - تيك توك - إنستا - فيسبوك بجودة عالية وبسرعة</div>

  <div class="input-box">
    <input type="text" id="url" placeholder="الصق رابط الفيديو هنا..." autocomplete="off" />
    <span class="icon">🔗</span>
  </div>

  <div class="btn-group">
    <button class="platform-btn">📸</button>
    <button class="platform-btn">📘</button>
    <button class="platform-btn">🎵</button>
    <button class="platform-btn">🎥</button>
  </div>

  <button class="main-btn" onclick="getQualities()">جلب الجودات</button>

  <div id="status">جاهز يا بوب... 🔥</div>

  <div id="progress">
    <div id="progress-bar"></div>
  </div>

  <!-- صفحة الجودات -->
  <div id="qualities-page">
    <div class="tab-group">
      <div class="tab active" onclick="showTab('video')">الفيديوهات</div>
      <div class="tab" onclick="showTab('audio')">الصوت</div>
    </div>

    <div id="video-tab" class="quality-list"></div>
    <div id="audio-tab" class="quality-list" style="display:none;"></div>
  </div>
</div>

<footer>
  © YoutDarsh – تم تصميمه وتطويره بواسطة Bob | 2026
</footer>

<script>
// ──────────────────────────────────────────────
const urlInput = document.getElementById('url');
const statusEl = document.getElementById('status');
const progressEl = document.getElementById('progress');
const progressBar = document.getElementById('progress-bar');
const qualitiesPage = document.getElementById('qualities-page');
const videoTab = document.getElementById('video-tab');
const audioTab = document.getElementById('audio-tab');

let currentData = null;

function updateStatus(text, color = '#00f0ff') {
  statusEl.textContent = text;
  statusEl.style.color = color;
}

function showLoading(show = true) {
  progressEl.style.display = show ? 'block' : 'none';
  progressBar.style.width = show ? '0%' : '0%';
}

function showTab(type) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');

  videoTab.style.display = type === 'video' ? 'grid' : 'none';
  audioTab.style.display = type === 'audio' ? 'grid' : 'none';
}

async function getQualities() {
  const url = urlInput.value.trim();
  if (!url) return updateStatus('أدخل رابط يا وحش!', '#ff1744');

  showLoading(true);
  updateStatus('جاري جلب الجودات...');

  try {
    const res = await fetch('https://api.get-save.com/api/v1/vidinfo', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url })
    });

    if (!res.ok) throw new Error('مشكلة في الخادم');

    const data = await res.json();
    currentData = data;

    showLoading(false);
    qualitiesPage.style.display = 'block';

    videoTab.innerHTML = '';
    audioTab.innerHTML = '';

    if (!data.sizes || data.sizes.length === 0) {
      updateStatus('مفيش جودات متاحة حاليًا', '#ff9800');
      return;
    }

    updateStatus(`تم جلب ${data.sizes.length} جودة بنجاح ✓`, '#00f0ff');

    // عرض صورة الفيديو في الأعلى
    if (data.meta?.thumbnail) {
      const thumbHtml = `<img src="${data.meta.thumbnail}" style="width:100%; max-width:420px; border-radius:16px; display:block; margin:0 auto 30px; box-shadow:0 0 30px rgba(0,240,255,0.4);" alt="thumbnail"/>`;
      videoTab.innerHTML += thumbHtml;
    }

    // ترتيب من الأعلى للأدنى (نفترض أن الـ sizes جاية مرتبة)
    data.sizes.forEach(item => {
      const isAudio = item.resolution === 'audio only' || !item.height;
      const resText = isAudio ? 'صوت فقط' : `${item.height}p`;
      const ext = item.ext || 'mp4';
      const sizeMB = item.filesize ? `${(item.filesize / 1024 / 1024).toFixed(1)} MB` : '';

      const card = `
        <div class="quality-card">
          <div class="quality-info">
            <div class="quality-title">${resText} ${sizeMB ? `• ${sizeMB}` : ''}</div>
            <div class="quality-desc">\( {ext} \){item.protocol ? ' • ' + item.protocol : ''}</div>
          </div>
          <button class="dl-btn" onclick="window.open('${item.url}', '_blank')">تحميل</button>
        </div>
      `;

      if (isAudio) {
        audioTab.innerHTML += card;
      } else {
        videoTab.innerHTML += card;
      }
    });

  } catch (err) {
    updateStatus('خطأ: ' + err.message, '#ff1744');
    showLoading(false);
  }
}
</script>
</body>
</html>
