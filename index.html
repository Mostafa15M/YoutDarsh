<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Darsh Egypt | Premium Downloader</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="script.js" defer></script>
    <style>
        :root { --bg-dark: #02040a; --glass: rgba(15, 23, 42, 0.8); --neon-blue: #00f2ff; --neon-purple: #bc13fe; --text-main: #f8fafc; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body { min-height: 100vh; background: var(--bg-dark); color: var(--text-main); display: flex; flex-direction: column; align-items: center; padding: 0 20px; }
        .container { width: 100%; max-width: 500px; display: flex; flex-direction: column; align-items: center; margin-top: 60px; }
        .logo { font-size: 50px; font-weight: 900; background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 30px; }
        .platforms { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; }
        .p-icon { width: 55px; height: 55px; background: var(--glass); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; border: 1px solid rgba(255,255,255,0.1); }
        .glass-card { width: 100%; background: var(--glass); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); padding: 30px; border-radius: 25px; }
        #url { width: 100%; padding: 20px; border-radius: 15px; border: 2px solid #1e293b; background: #0a1120; color: white; margin-bottom: 20px; text-align: center; outline: none; }
        .main-btn { width: 100%; padding: 18px; border: none; border-radius: 15px; font-weight: 900; font-size: 18px; color: white; cursor: pointer; background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple)); }
        #yt-info { margin-top: 20px; display: none; text-align: center; }
        #yt-thumb { width: 100%; border-radius: 15px; border: 1px solid var(--neon-blue); }
        .quality-item { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; margin-bottom: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container" id="main-page">
        <div class="logo">Darsh Egypt</div>
        <div class="platforms">
            <div class="p-icon"><i class="fab fa-instagram" style="color:#e1306c"></i></div>
            <div class="p-icon"><i class="fab fa-facebook-f" style="color:#1877f2"></i></div>
            <div class="p-icon"><i class="fab fa-tiktok" style="color:#fff"></i></div>
            <div class="p-icon"><i class="fab fa-youtube" style="color:#ff0000"></i></div>
        </div>
        <div class="glass-card">
            <input type="text" id="url" placeholder="أدخل الرابط هنا...">
            <button id="download-btn" class="main-btn" onclick="handleDarshDownload()">تحميل ⬇</button>
            <div id="yt-info">
                <img id="yt-thumb" src="" alt="Thumbnail">
                <p id="yt-title" style="margin-top:10px; font-size:14px;"></p>
                <div id="status-msg" style="color:var(--neon-blue); font-size:12px; margin-top:10px;">جاري تجهيز الروابط... ✨</div>
            </div>
        </div>
    </div>

    <div class="container" id="qualities-page" style="display:none;">
        <div class="glass-card">
            <h3 style="text-align:center; margin-bottom:20px; color:var(--neon-blue);">اختر الجودة</h3>
            <div id="list-v"></div>
            <button style="width:100%; margin-top:20px; background: transparent; color: white; border: 1px dashed var(--neon-blue); padding: 15px; border-radius: 15px;" onclick="location.reload()">رجوع 🔙</button>
        </div>
    </div>
</body>
</html>
