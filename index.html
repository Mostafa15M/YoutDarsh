<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Darsh Egypt | Premium Downloader</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="script.js" defer></script>
    <style>
        :root { --bg-dark: #02040a; --glass: rgba(15, 23, 42, 0.8); --neon-blue: #00f2ff; --neon-purple: #bc13fe; --text-main: #f8fafc; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body { min-height: 100vh; background: var(--bg-dark); color: var(--text-main); display: flex; flex-direction: column; align-items: center; padding: 0 20px; overflow-x: hidden; position: relative; background-image: radial-gradient(circle at 10% 20%, rgba(0,242,255,0.05) 0%, transparent 20%), radial-gradient(circle at 90% 80%, rgba(188,19,254,0.05) 0%, transparent 20%); }
        .container { width: 100%; max-width: 500px; z-index: 10; display: flex; flex-direction: column; align-items: center; margin-top: 60px; }
        .logo { font-size: 50px; font-weight: 900; background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple), var(--neon-blue)); background-size: 200%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: colorShift 8s linear infinite; margin-bottom: 30px; }
        @keyframes colorShift { 0%{background-position:0%} 100%{background-position:200%} }
        .glass-card { width: 100%; background: var(--glass); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); padding: 35px 25px; border-radius: 28px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        #url { width: 100%; padding: 22px; border-radius: 18px; border: 2px solid #1e293b; background: #0a1120; color: white; margin-bottom: 25px; text-align: center; outline: none; }
        .main-btn { width: 100%; padding: 20px; border: none; border-radius: 18px; font-weight: 900; font-size: 18px; color: white; cursor: pointer; background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple)); }
        #yt-info { margin-top: 20px; display: none; text-align: center; }
        #yt-thumb { width: 100%; border-radius: 15px; border: 1px solid var(--neon-blue); margin-bottom: 10px; }
        .status-msg { margin-top: 15px; text-align: center; font-size: 14px; color: var(--neon-blue); display: none; }
        .quality-item { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.03); padding: 18px 20px; border-radius: 15px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; }
    </style>
</head>
<body>
    <div class="container" id="main-page">
        <div class="logo">Darsh Egypt</div>
        <div class="glass-card">
            <input type="text" id="url" placeholder="ضع رابط يوتيوب أو تيك توك هنا...">
            <button id="download-btn" class="main-btn" onclick="handleDarshDownload()">تحميل ⬇</button>
            <div id="yt-info">
                <img id="yt-thumb" src="" alt="Thumbnail">
                <p id="yt-title" style="font-size: 14px;"></p>
            </div>
            <div id="status-msg" class="status-msg">جاري تجهيز الجودات... ✨</div>
        </div>
    </div>

    <div class="container" id="qualities-page" style="display:none;">
        <div class="glass-card">
            <h3 style="text-align:center; margin-bottom:20px; color:var(--neon-blue);">اختر الجودة للتحميل</h3>
            <div id="list-v"></div>
            <button style="width:100%; margin-top:20px; background: transparent; color: white; border: 1px dashed var(--neon-blue); padding: 15px; border-radius: 15px;" onclick="location.reload()">رجوع 🔙</button>
        </div>
    </div>
</body>
</html>
