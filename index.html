<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Darsh Egypt | Premium Downloader</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #02040a;
            --glass: rgba(15, 23, 42, 0.8);
            --neon-blue: #00f2ff;
            --neon-purple: #bc13fe;
            --text-main: #f8fafc;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body {
            min-height: 100vh; background: var(--bg-dark); color: var(--text-main);
            display: flex; flex-direction: column; align-items: center; padding: 0 20px;
            overflow-x: hidden; position: relative;
        }
        .star {
            position: absolute; width: 150px; height: 150px;
            background: radial-gradient(circle, rgba(0, 242, 255, 0.08) 0%, transparent 70%);
            border-radius: 50%; z-index: -1; animation: move 20s infinite alternate ease-in-out;
        }
        @keyframes move { from { transform: translate(0, 0); } to { transform: translate(50px, 100px); } }
        .container { 
            width: 100%; max-width: 500px; z-index: 10; 
            display: flex; flex-direction: column; align-items: center;
            margin-top: 60px; animation: fadeIn 0.8s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .logo-area { text-align: center; margin-bottom: 40px; }
        .logo {
            font-size: 50px; font-weight: 900;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple), var(--neon-blue));
            background-size: 200%; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: colorShift 8s linear infinite;
        }
        @keyframes colorShift { 0%{background-position:0%} 100%{background-position:200%} }
        .subtitle { color: #94a3b8; font-size: 16px; margin-top: 5px; }
        .platforms { display: flex; justify-content: center; gap: 15px; margin-bottom: 40px; }
        .p-icon { 
            width: 65px; height: 65px; background: var(--glass); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 18px; display: flex; align-items: center; justify-content: center;
            font-size: 26px; backdrop-filter: blur(10px);
        }
        .glass-card {
            width: 100%; background: var(--glass); backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1); padding: 35px 25px;
            border-radius: 28px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        #url {
            width: 100%; padding: 22px; border-radius: 18px; border: 2px solid #1e293b;
            background: #0a1120; color: white; margin-bottom: 25px; text-align: center;
            font-size: 16px; outline: none;
        }
        .main-btn {
            width: 100%; padding: 20px; border: none; border-radius: 18px;
            font-weight: 900; font-size: 18px; color: white; cursor: pointer;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
        }
        .quality-header { background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple)); padding: 15px; border-radius: 15px; font-weight: 800; text-align: center; margin-bottom: 20px; }
        .quality-item { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.03); padding: 18px 20px; border-radius: 15px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; }
        footer { margin-top: 50px; padding-bottom: 30px; font-size: 12px; }
    </style>
</head>
<body>

    <div class="star"></div><div class="star"></div><div class="star"></div>

    <div class="container" id="main-page">
        <div class="logo-area">
            <div class="logo">Darsh Egypt</div>
            <p class="subtitle">Premium Media Downloader</p>
        </div>
        
        <div class="platforms">
            <div class="p-icon"><i class="fab fa-instagram" style="color:#e1306c"></i></div>
            <div class="p-icon"><i class="fab fa-facebook-f" style="color:#1877f2"></i></div>
            <div class="p-icon"><i class="fab fa-tiktok" style="color:#fff"></i></div>
            <div class="p-icon"><i class="fab fa-youtube" style="color:#ff0000"></i></div>
        </div>

        <div class="glass-card">
            <input type="text" id="url" placeholder="أدخل رابط الفيديو هنا...">
            <button class="main-btn" id="btn-text" onclick="handleDarshDownload()">تحميل ⬇</button>
            <div style="text-align: center; margin-top: 20px;">
                <a href="https://t.me/DarshEgypt" target="_blank" style="color: #94a3b8; text-decoration: none; font-weight: bold;">
                   BY DARSH EGYPT <i class="fab fa-telegram"></i>
                </a>
            </div>
        </div>
    </div>

    <div class="container" id="qualities-page" style="display:none;">
        <div class="glass-card">
            <div class="quality-header">⬇ الروابط المتاحة بالصوت </div>
            <div id="list-v"></div>
            <button class="tab" style="width:100%; margin-top:20px; border: 1px dashed var(--neon-blue); background: transparent; color: white; padding: 10px; border-radius: 10px;" onclick="location.reload()">العودة للخلف 🔙</button>
        </div>
    </div>

    <footer>
        BY DARSH EGYPT © 2026
    </footer>

    <script>
        async function handleDarshDownload() {
            const inputUrl = document.getElementById('url').value.trim();
            if(!inputUrl) return alert("ادخل الرابط 🗝️");
            
            document.getElementById('btn-text').innerText = "جاري الفحص... ✨";

            // استدعاء الـ API بتاعك الأصلي
            try {
                const res = await fetch('https://api.get-save.com/api/v1/vidinfo', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({url: inputUrl})
                });
                const data = await res.json();
                renderQualities(data);
            } catch(e) { 
                alert("خطأ في الاتصال بالسيرفر! ❌");
                document.getElementById('btn-text').innerText = "تحميل ⬇";
            }
        }

        function renderQualities(data) {
            document.getElementById('main-page').style.display = 'none';
            document.getElementById('qualities-page').style.display = 'flex';
            const lv = document.getElementById('list-v'); 
            lv.innerHTML = '';
            
            // ترتيب الجودات وتصفية الروابط
            const sorted = (data.sizes || []).sort((a, b) => (parseInt(b.height) || 0) - (parseInt(a.height) || 0));

            sorted.forEach(s => {
                // تريك الصوت: في API بتاع get-save، الجودات اللي فيها صوت وصورة مع بعض
                // غالباً بتكون mp4 وبجودات 720p أو 360p. 
                // إحنا هنعرض الروابط المباشرة وهنوضح للمستخدم الجودة.
                
                let iconColor = "var(--neon-blue)";
                let extraInfo = "جاهز للتحميل ✅";
                
                // لو الجودة 1080p جوجل بتبعتها فيديو بس، هننبه المستخدم
                if(parseInt(s.height) > 720) {
                    extraInfo = "فيديو فقط (بدون صوت) ⚠️";
                    iconColor = "#ffcc00";
                }

                const label = !s.height ? 'ملف صوتي MP3' : s.height + 'p';

                lv.innerHTML += `
                    <div class="quality-item" onclick="window.open('${s.url}', '_blank')">
                        <div style="display:flex; flex-direction:column;">
                            <span style="font-weight:900;">${label}</span>
                            <span style="font-size:10px; color:#94a3b8;">${extraInfo}</span>
                        </div>
                        <i class="fas fa-download" style="color:${iconColor}"></i>
                    </div>`;
            });
        }
    </script>
</body>
</html>
