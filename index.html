<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Darsh Egypt</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

:root{
--bg:#020617;
--card:#0b1225;
--border:#1e293b;
--blue:#00e5ff;
--purple:#a855f7;
--text:#e2e8f0;
--gray:#94a3b8;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Tajawal',sans-serif;
}

body{

background:#020617;
color:white;
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
padding:25px;

background-image:
radial-gradient(2px 2px at 20% 30%, #38bdf8, transparent),
radial-gradient(2px 2px at 80% 40%, #a855f7, transparent),
radial-gradient(2px 2px at 40% 80%, #38bdf8, transparent),
radial-gradient(1px 1px at 70% 70%, #a855f7, transparent);

background-size:600px 600px;
}

.container{
width:100%;
max-width:500px;
text-align:center;
}

.logo{
font-size:34px;
font-weight:900;
background:linear-gradient(90deg,#00e5ff,#a855f7);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
margin-bottom:8px;
}

.subtitle{
color:var(--gray);
font-size:13px;
margin-bottom:25px;
}

.platforms{
display:flex;
justify-content:center;
gap:10px;
margin-bottom:30px;
}

.platform-icon{
width:50px;
height:50px;
border-radius:12px;
background:var(--card);
border:1px solid var(--border);
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
color:white;
transition:.3s;
}

.platform-icon:hover{
border-color:var(--blue);
box-shadow:0 0 12px var(--blue);
transform:translateY(-3px);
}

.input-box{
margin-bottom:12px;
}

#url{
width:100%;
padding:14px;
border-radius:10px;
border:1px solid var(--border);
background:#0b1120;
color:white;
font-size:14px;
outline:none;
}

.main-btn{
width:100%;
padding:14px;
border:none;
border-radius:12px;
font-size:15px;
font-weight:700;
background:linear-gradient(90deg,#00e5ff,#a855f7);
cursor:pointer;
}

#status{
margin-top:12px;
font-size:13px;
color:var(--gray);
}

#qualities-page{
margin-top:30px;
}

.quality-title{
background:linear-gradient(90deg,#00e5ff,#a855f7);
padding:10px;
border-radius:10px;
margin-bottom:20px;
font-weight:700;
}

.tab-group{
display:flex;
gap:10px;
margin-bottom:15px;
}

.tab{
flex:1;
padding:10px;
border-radius:10px;
background:var(--card);
border:1px solid var(--border);
cursor:pointer;
font-size:14px;
}

.tab.active{
background:linear-gradient(90deg,#00e5ff,#a855f7);
color:black;
}

.thumb{
width:100%;
border-radius:12px;
margin-bottom:20px;
}

.quality-list{
display:flex;
flex-direction:column;
gap:10px;
}

.quality-card{
display:flex;
justify-content:space-between;
align-items:center;
background:var(--card);
border:1px solid var(--border);
border-radius:12px;
padding:12px;
}

.quality-title-text{
font-size:14px;
font-weight:700;
}

.quality-desc{
font-size:11px;
color:var(--gray);
}

.dl-btn{
background:var(--blue);
border:none;
padding:7px 12px;
border-radius:8px;
font-size:13px;
font-weight:700;
cursor:pointer;
}

.dl-btn:hover{
background:var(--purple);
color:white;
}

footer{
margin-top:50px;
font-size:12px;
color:#475569;
}

</style>
</head>

<body>

<div class="container" id="main-page">

<div class="logo">Darsh Egypt</div>

<div class="subtitle">
تنزيل من يوتيوب - تيك توك - فيسبوك - إنستا
</div>

<div class="platforms">

<div class="platform-icon">
<i class="fab fa-instagram"></i>
</div>

<div class="platform-icon">
<i class="fab fa-facebook-f"></i>
</div>

<div class="platform-icon">
<i class="fab fa-tiktok"></i>
</div>

<div class="platform-icon">
<i class="fab fa-youtube"></i>
</div>

</div>

<div class="input-box">
<input type="text" id="url" placeholder="أدخل رابط الفيديو هنا">
</div>

<button class="main-btn" onclick="getQualities()">
⬇ ابدأ التحميل الآن
</button>

<div id="status">جاهز 🔥</div>

</div>

<div class="container" id="qualities-page" style="display:none">

<div class="quality-title">
⬇ Quality
</div>

<img id="thumb" class="thumb" style="display:none">

<div class="tab-group">

<div class="tab active" onclick="showTab('video')">
🎬 الفيديو
</div>

<div class="tab" onclick="showTab('audio')">
🎧 الصوت
</div>

</div>

<div id="video-tab" class="quality-list"></div>

<div id="audio-tab" class="quality-list" style="display:none"></div>

</div>

<footer>
© Darsh Egypt
</footer>

<script>

const urlInput = document.getElementById('url');
const statusEl = document.getElementById('status');
const mainPage = document.getElementById('main-page');
const qualitiesPage = document.getElementById('qualities-page');
const thumbImg = document.getElementById('thumb');
const videoTab = document.getElementById('video-tab');
const audioTab = document.getElementById('audio-tab');

function updateStatus(text, color = '#00d4ff') {
statusEl.textContent = text;
statusEl.style.color = color;
}

function showTab(type) {

document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
event.target.classList.add('active');

videoTab.style.display = type === 'flex' || type === 'video' ? 'flex' : 'none';
audioTab.style.display = type === 'audio' ? 'flex' : 'none';

}

async function getQualities() {

const url = urlInput.value.trim();

if (!url)
return updateStatus('أدخل رابط');

updateStatus('جاري جلب الجودات...');

try {

const res = await fetch('https://api.get-save.com/api/v1/vidinfo', {

method: 'POST',

headers: {
'Content-Type': 'application/json'
},

body: JSON.stringify({
url
})

});

const data = await res.json();

mainPage.style.display='none';
qualitiesPage.style.display='block';

videoTab.innerHTML='';
audioTab.innerHTML='';

if(data.meta?.thumbnail){
thumbImg.src=data.meta.thumbnail;
thumbImg.style.display='block';
}

/* ترتيب الجودات */

const sortedSizes = [...data.sizes].sort((a,b)=>{
return (b.height || 0) - (a.height || 0);
});

sortedSizes.forEach((item,index)=>{

const isAudio = item.resolution === 'audio only' || !item.height;

let label='';

if(!isAudio){

if(index===0){
label=' • UHD';
}
else if(item.height>=720){
label=' • HD';
}

}

const resText = isAudio ? 'MP3 صوت' : item.height+'p';

const card = `

<div class="quality-card">

<div>

<div class="quality-title-text">${resText}${label}</div>

<div class="quality-desc">${item.ext}</div>

</div>

<button class="dl-btn" onclick="window.open('${item.url}')">
تحميل
</button>

</div>

`;

if(isAudio){
audioTab.innerHTML+=card;
}else{
videoTab.innerHTML+=card;
}

});

} catch(err){

updateStatus('خطأ', '#ff1744');

}

}

</script>

</body>
</html>
