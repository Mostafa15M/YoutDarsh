    <style>
        :root {
            --bg-dark: #02040a;
            --glass: rgba(15, 23, 42, 0.8);
            --neon-blue: #00f2ff;
            --neon-purple: #bc13fe;
            --text-main: #f8fafc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }

        body {
            min-height: 100vh; background: var(--bg-dark); color: var(--text-main);
            display: flex; flex-direction: column; align-items: center; padding: 0 20px;
            overflow-x: hidden; position: relative;
        }

        /* تنسيق إخفاء منطقة الإعلانات */
        #ad-layer { position: absolute; width: 1px; height: 1px; overflow: hidden; opacity: 0; pointer-events: none; z-index: -999; }

        /* النجوم المتحركة */
        .star {
            position: absolute; width: 150px; height: 150px;
            background: radial-gradient(circle, rgba(0, 242, 255, 0.08) 0%, transparent 70%);
            border-radius: 50%; z-index: -1; animation: move 20s infinite alternate ease-in-out;
        }
        .star:nth-child(1) { top: 10%; left: 10%; background: radial-gradient(circle, rgba(188, 19, 254, 0.1) 0%, transparent 70%); animation-duration: 25s; }
        .star:nth-child(2) { top: 60%; left: 80%; animation-duration: 18s; }
        .star:nth-child(3) { top: 80%; left: 20%; background: radial-gradient(circle, rgba(188, 19, 254, 0.08) 0%, transparent 70%); animation-duration: 22s; }
        .star:nth-child(4) { top: 30%; left: 70%; animation-duration: 30s; }
        .star:nth-child(5) { top: 50%; left: 40%; background: radial-gradient(circle, rgba(0, 242, 255, 0.05) 0%, transparent 70%); animation-duration: 20s; }
        .star:nth-child(6) { top: 15%; left: 50%; animation-duration: 28s; }

        @keyframes move {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(50px, 100px) scale(1.2); }
        }

        .container { 
            width: 100%; max-width: 500px; z-index: 10; 
            display: flex; flex-direction: column; align-items: center;
            margin-top: 60px; animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .logo-area { text-align: center; margin-bottom: 40px; }
        .logo {
            font-size: 50px; font-weight: 900;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple), var(--neon-blue));
            background-size: 200%; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: colorShift 8s linear infinite;
        }
        @keyframes colorShift { 0%{background-position:0%} 100%{background-position:200%} }
        .subtitle { color: #94a3b8; font-size: 16px; margin-top: 5px; }

        .platforms { display: flex; justify-content: center; gap: 15px; margin-bottom: 40px; }
        .p-icon { 
            width: 65px; height: 65px; background: var(--glass); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 18px; display: flex; align-items: center; justify-content: center;
            font-size: 26px; backdrop-filter: blur(10px);
        }

        .glass-card {
            width: 100%; background: var(--glass); backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1); padding: 35px 25px;
            border-radius: 28px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        #url {
            width: 100%; padding: 22px; border-radius: 18px; border: 2px solid #1e293b;
            background: #0a1120; color: white; margin-bottom: 25px; text-align: center;
            font-size: 16px; outline: none;
        }

        .main-btn {
            width: 100%; padding: 20px; border: none; border-radius: 18px;
            font-weight: 900; font-size: 18px; color: white; cursor: pointer;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
            box-shadow: 0 5px 15px rgba(188, 19, 254, 0.3);
        }

        /* تنسيق الرابط الجديد */
        .tg-link {
            display: inline-flex; align-items: center; gap: 8px;
            color: #94a3b8; text-decoration: none; font-weight: bold;
            transition: 0.3s; cursor: pointer; margin-top: 20px;
        }
        .tg-link:hover { color: var(--neon-blue); transform: scale(1.05); }
        .tg-link i { font-size: 18px; color: #24A1DE; }

        .quality-container { display: none; width: 100%; }
        .quality-header { background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple)); padding: 15px; border-radius: 15px; font-weight: 800; text-align: center; margin-bottom: 20px; }
        .tab-group { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { flex: 1; padding: 15px; border-radius: 15px; border: 1px solid #1e293b; text-align: center; cursor: pointer; background: rgba(255,255,255,0.02); }
        .tab.active { border-color: var(--neon-blue); background: rgba(0, 229, 255, 0.1); color: var(--neon-blue); }
        .quality-item { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.03); padding: 18px 20px; border-radius: 15px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.05); }

        footer { margin-top: 50px; padding-bottom: 30px; font-size: 12px; }
    </style>
</head>

    <script>
        async function handleDarshDownload() {
            const inputUrl = document.getElementById('url').value.trim();
            if(!inputUrl) return alert("ادخل الرابط🗝️");
            if (inputUrl.includes("tiktok.com") || inputUrl.includes("instagram.com")) {
                window.location.href = `https://9xbuddy.com/process?url=${encodeURIComponent(inputUrl)}`;
            } else { fetchFromOldApi(inputUrl); }
        }

        async function fetchFromOldApi(url) {
            try {
                const res = await fetch('https://api.get-save.com/api/v1/vidinfo', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({url: url})
                });
                const data = await res.json();
                renderQualities(data);
            } catch(e) { alert("خطأ في الرابط! ❌"); }
        }

        function renderQualities(data) {
            document.getElementById('main-page').style.display = 'none';
            document.getElementById('qualities-page').style.display = 'flex';
            const lv = document.getElementById('list-v'); lv.innerHTML = '';
            const sorted = (data.sizes || []).sort((a, b) => (parseInt(b.height) || 0) - (parseInt(a.height) || 0));
            sorted.forEach(s => {
                lv.innerHTML += `<div class="quality-item" onclick="window.open('${s.url}', '_blank')"><span>${!s.height ? 'صوت MP3' : s.height+'p'}</span><i class="fas fa-download" style="color:var(--neon-blue)"></i></div>`;
            });
        }
    </script>
