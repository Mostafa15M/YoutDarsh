<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Darsh Egypt | Premium Downloader</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="script.js" defer></script>
    <style>
        :root { --bg-dark: #02040a; --glass: rgba(15, 23, 42, 0.9); --neon-blue: #00f2ff; --neon-purple: #bc13fe; --text-main: #f8fafc; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body { min-height: 100vh; background: var(--bg-dark); color: var(--text-main); display: flex; flex-direction: column; align-items: center; padding: 20px; background-image: radial-gradient(circle at top right, #1e1b4b, transparent), radial-gradient(circle at bottom left, #1e1b4b, transparent); }
        .container { width: 100%; max-width: 500px; margin-top: 40px; }
        .logo { font-size: 50px; font-weight: 900; text-align: center; background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 30px; filter: drop-shadow(0 0 10px rgba(0,242,255,0.3)); }
        .glass-card { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); padding: 30px; border-radius: 25px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        #url { width: 100%; padding: 20px; border-radius: 15px; border: 2px solid #1e293b; background: #0a1120; color: white; margin-bottom: 20px; text-align: center; font-size: 16px; outline: none; transition: 0.3s; }
        #url:focus { border-color: var(--neon-blue); box-shadow: 0 0 15px rgba(0,242,255,0.2); }
        .main-btn { width: 100%; padding: 18px; border: none; border-radius: 15px; font-weight: 900; font-size: 18px; color: white; cursor: pointer; background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple)); transition: 0.3s; transform: scale(1); }
        .main-btn:active { transform: scale(0.98); }
        .main-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        #yt-preview { margin-top: 25px; display: none; text-align: center; animation: fadeIn 0.5s ease; }
        #yt-thumb { width: 100%; border-radius: 15px; border: 2px solid var(--neon-blue); margin-bottom: 15px; }
        .quality-card { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.05); padding: 18px; border-radius: 15px; margin-bottom: 12px; cursor: pointer; transition: 0.3s; border: 1px solid transparent; }
        .quality-card:hover { background: rgba(255,255,255,0.1); border-color: var(--neon-blue); transform: translateY(-2px); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="container" id="main-view">
        <div class="logo">Darsh Egypt</div>
        <div class="glass-card">
            <input type="text" id="url" placeholder="أدخل رابط الفيديو هنا...">
            <button id="download-btn" class="main-btn" onclick="startDownload()">تحميل الآن ⬇</button>
            <div id="yt-preview">
                <img id="yt-thumb" src="" alt="Thumbnail">
                <p id="yt-title" style="font-weight:bold; margin-bottom:10px;"></p>
                <div style="color:var(--neon-blue); font-size:14px;"><i class="fas fa-spinner fa-spin"></i> جاري استخراج الروابط...</div>
            </div>
        </div>
    </div>

    <div class="container" id="quality-view" style="display:none;">
        <div class="glass-card">
            <h3 style="text-align:center; margin-bottom:25px; color:var(--neon-blue);"><i class="fas fa-list"></i> اختر الجودة المطلوبة</h3>
            <div id="links-list"></div>
            <button class="main-btn" style="margin-top:20px; background:rgba(255,255,255,0.05); border:1px solid #333;" onclick="location.reload()">تحميل فيديو آخر 🔙</button>
        </div>
    </div>
</body>
</html>
